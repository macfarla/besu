name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - release-*
      - verkle
      - performance
      - '*-devnet-*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Xmx6g -Dorg.gradle.parallel=true"

# Job matrix:
#
#   push to main:      [repoLint, gradleWrapper, spotless, checkLicense]
#                    → build
#                    → dockerBuildTest (docker-build-test.yml: build + goss-test)
#                    → dockerPublish   (docker-publish.yml: push `develop` image + sign)
#
#   pull_request:    [repoLint, gradleWrapper, spotless, checkLicense]
#                  → [build, verifySourceMetadata, unitTests, integrationTests, referenceTests, acceptanceTests]
#                  → dockerBuildTest (docker-build-test.yml: build + goss-test; dockerPublish skipped - not on main)
#                  → allTestsPassed (PR merge gate).

jobs:

  repoLint:
    name: "Repository Linting"
    runs-on: ubuntu-latest
    container: ghcr.io/todogroup/repolinter:v0.11.2
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - name: Lint Repo
        run: bundle exec /app/bin/repolinter.js --rulesetUrl https://raw.githubusercontent.com/hyperledger-labs/hyperledger-community-management-tools/main/repo_structure/repolint.json --format markdown

  gradleWrapper:
    name: "Gradle Wrapper Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - uses: gradle/actions/wrapper-validation@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

  spotless:
    name: "Spotless"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-disabled: true
      - name: run spotless
        run: ./gradlew spotlessCheck

  checkLicense:
    name: "Check License"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-disabled: true
      - name: run checkLicense
        run: ./gradlew --no-parallel checkLicense # no-parallel due to https://github.com/jk1/Gradle-License-Report/issues/337
      - name: upload license report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: checkLicense
          path: build/reports/dependency-license

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [spotless, checkLicense, gradleWrapper, repoLint]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-disabled: true
      - name: Gradle Build
        run: ./gradlew build -x test -x spotlessCheck
      - name: Upload tar.gz
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: besu-tar
          path: build/distributions/besu-*.tar.gz
          retention-days: 10
      - name: Upload zip
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: besu-zip
          path: build/distributions/besu-*.zip
          retention-days: 10
      - name: Upload workspace build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: assemble-output
          path: |
            ./
            !./.git/**
          retention-days: 1
          include-hidden-files: 'true'

  # Supply chain security: verifies that source JARs for all dependencies are recorded
  # in verification-metadata.xml. Prevents tampered or undeclared source artifacts
  # from being introduced without explicit sign-off.
  verifySourceMetadata:
    name: "Verify Dependency Source Metadata"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [spotless, checkLicense, gradleWrapper, repoLint]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-disabled: true
      - name: Verify source artifacts recorded in verification-metadata.xml
        run: ./gradlew verifySourceArtifacts

  # Tests
  # Each suite has its suite-tests-passed job in the file directly
  unitTests:
    if: github.event_name == 'pull_request'
    needs: [spotless, checkLicense, gradleWrapper, repoLint]
    permissions:
      actions: read
      contents: read
      checks: write
      statuses: write
    uses: ./.github/workflows/unit-tests.yml

  integrationTests:
    if: github.event_name == 'pull_request'
    needs: [spotless, checkLicense, gradleWrapper, repoLint]
    permissions:
      actions: read
      contents: read
      checks: write
      statuses: write      
    uses: ./.github/workflows/integration-tests.yml

  referenceTests:
    if: github.event_name == 'pull_request'
    needs: [spotless, checkLicense, gradleWrapper, repoLint]
    permissions:
      actions: read
      contents: read
      packages: read
      checks: write
      statuses: write      
    uses: ./.github/workflows/reference-tests.yml
    secrets: inherit

  acceptanceTests:
    if: github.event_name == 'pull_request'
    needs: [spotless, checkLicense, gradleWrapper, repoLint]
    permissions:
      actions: read
      contents: read
      checks: write
      statuses: write
    uses: ./.github/workflows/acceptance-tests.yml
    secrets: inherit

  dockerBuildTest:
    needs: build
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/docker-build-test.yml
    with:
      assemble_run_id: ${{ github.run_id }}
      cache_scope: ci-pr-build
    secrets: inherit

  # only fires on merge to main, so 'develop' is kept up to date
  dockerPublish:
    needs: [build, dockerBuildTest]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: develop
      cache_scope: ci-pr-build
    secrets: inherit

  allTestsPassed:
    name: allTestsPassed
    runs-on: ubuntu-latest
    needs: [verifySourceMetadata, unitTests, integrationTests, referenceTests, acceptanceTests, dockerBuildTest]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Fail on workflow error
        run: exit 1
        if: >-
          ${{
            contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped')
          }}    