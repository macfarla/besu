name: docker-build-test

on:
  workflow_call:
    inputs:
      assemble_run_id:
        required: false
        type: string
      version:
        required: false
        type: string
      cache_scope:
        required: false
        type: string
        default: 'docker-build'

jobs:
  buildTestDocker:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: 'recursive'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Download assemble-output
        if: ${{ inputs.assemble_run_id != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.assemble_run_id }}
          name: assemble-output
          merge-multiple: true
          path: ${{ github.workspace }}
      - name: Set up Java
        if: ${{ inputs.assemble_run_id == '' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
      - name: Stage Docker build context
        run: |
          if [[ -n "${{ inputs.assemble_run_id }}" ]]; then
            # Artifacts are pre-built and downloaded from a prior assemble workflow run,
            # so only bash is needed here — just unpack the tar and arrange the files into the layout the Dockerfile expects. No Java compilation required.
            TAR_FILE=$(find build/distributions -name "besu-*.tar.gz" | head -1)
            mkdir -p build/docker-besu
            tar -xzf "$TAR_FILE" -C build/docker-besu/
            rm -rf build/docker-besu/besu
            mv build/docker-besu/besu-* build/docker-besu/besu
            cp docker/Dockerfile docker/pyroscope.properties build/docker-besu/
          elif [[ -n "${{ inputs.version }}" ]]; then
            # No pre-built artifact: compile and stage via Gradle with an explicit release version so the distribution carries the correct version string in its metadata.
            ./gradlew --no-daemon -Prelease.releaseVersion=${{ inputs.version }} -Pversion=${{ inputs.version }} distDockerCopy
          else
            # No pre-built artifact and no version override: compile and stage via Gradle for an unversioned development build (e.g. a local or PR test run).
            ./gradlew --no-daemon distDockerCopy
          fi
      - name: Build amd64 image for testing
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: build/docker-besu
          load: true
          build-args: |
            VERSION=${{ inputs.version || 'develop' }}
            VCS_REF=${{ github.sha }}
          tags: hyperledger/besu:test
          cache-from: type=gha,scope=${{ inputs.cache_scope }}-amd64
          cache-to: type=gha,mode=max,scope=${{ inputs.cache_scope }}-amd64
      - name: Download Goss binaries
        run: |
          GOSS_VERSION="v0.4.9"
          TEST_DIR="docker/tests"
          curl -fsSL "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/goss-linux-amd64" \
            -o "${TEST_DIR}/goss-linux-amd64"
          chmod +x "${TEST_DIR}/goss-linux-amd64"
          curl -fsSL "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/dgoss" \
            -o "${TEST_DIR}/dgoss"
          chmod +x "${TEST_DIR}/dgoss"
      - name: Run Docker tests
        env:
          architecture: amd64
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          mkdir -p docker/reports
          cd docker && ./test.sh hyperledger/besu:test
